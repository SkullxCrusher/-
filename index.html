  font-size: 16px;

}
.price-display {

  color: #fff;

  border-radius: 20px;
  margin-top: 10px;
  display: inline-block;
}
.price-filter {
  width: 100%;
  max-width: 400px;
  margin-top: 10px;
  cursor: pointer;
}
/* ===== HERO ===== */
.hero {
  height: 250px;
  background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),

  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
}
/* ===== NAV ===== */
nav {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 20px;
  background: #222;
  flex-wrap: wrap;
}
nav button {
  padding: 10px 25px;
  background: #444;
  color: #fff;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}
nav button.active {
  background: #25D366;
}
/* ===== PRODUCTS ===== */
.container {
  padding: 30px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  max-width: 1400px;
  margin: 0 auto;
}
.product-card {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  text-align: center;
  padding-bottom: 15px;
  transition: 0.3s;
}
.product-card:hover {
  transform: translateY(-10px);
}
.product-card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}
.price {
  color: #25D366;
  font-weight: bold;
  font-size: 20px;
  margin: 10px 0;
}
.whatsapp-btn {
  display: inline-block;
  margin: 10px;
  padding: 10px 20px;
  background: #25D366;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}
footer {

  color: #fff;
  text-align: center;
  padding: 40px;
  margin-top: 40px;

.sticky-whatsapp {

  bottom: 20px;
  right: 20px;
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;

  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  z-index: 1000;
}

const container = document.getElementById('productGrid');

function displayProducts(data) {
  container.innerHTML = "";
  if (data.length === 0) {
    container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>❌ لا توجد نتائج مطابقة</p>";
    return;
  }
  data.forEach(p => {
    const card = `
      <div class="product-card">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>عطر ${p.cat} فاخر</p>
        <p class="price">₪${p.price}</p>
        <a class="whatsapp-btn" href="https://wa.me/972525111404?text=مرحبا%20بدي%20استفسر%20عن%20${p.name}" target="_blank">💬 تواصل</a>
      </div>
    `;
    container.innerHTML += card;
  });
}

displayProducts(perfumeData);

const searchInput = document.getElementById('search');
const priceFilter = document.getElementById('priceFilter');
const priceDisplay = document.getElementById('priceDisplay');
const buttons = document.querySelectorAll('.filter-btn');

function filter() {
  const term = searchInput.value.toLowerCase();
  const maxPrice = parseInt(priceFilter.value);
  const activeBtn = document.querySelector('.filter-btn.active');
  const cat = activeBtn ? activeBtn.dataset.category : 'all';

  const filtered = perfumeData.filter(p => {
    const matchName = p.name.toLowerCase().includes(term);
    const matchPrice = p.price <= maxPrice;
    const matchCat = cat === 'all' || p.cat === cat;
    return matchName && matchPrice && matchCat;
  });
  
  displayProducts(filtered);
}

priceFilter.addEventListener('input', (e) => {
  priceDisplay.textContent = e.target.value;
  filter();
});

searchInput.addEventListener('keyup', filter);

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter();
  });
});
